spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:4}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:60000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:300000}
      keepalive-time: ${DB_POOL_KEEPALIVE_MS:0}
      connection-init-sql: SET TIME ZONE 'America/Sao_Paulo'

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: America/Sao_Paulo
          fetch_size: 100
        default_batch_fetch_size: 32

server:
  port: ${PORT:8080}

  tomcat:
    threads:
      max: ${TOMCAT_THREADS_MAX:20}
    accept-count: ${TOMCAT_ACCEPT_COUNT:20}