services:
  postgres:
    image: postgres:16-alpine
    container_name: checklist-backend-db
    environment:
      POSTGRES_DB: checklist_nasr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d checklist_nasr"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
