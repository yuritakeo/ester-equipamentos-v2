version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: checklist-db
    environment:
      POSTGRES_DB: checklist_nasr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d checklist_nasr"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./Backend ✅ (usa seu Dockerfile atual)
    container_name: checklist-backend
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: dev-low
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/checklist_nasr
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"

  frontend:
    build: ./Checklist_equipamentos ✅
    container_name: checklist-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_dev_data: